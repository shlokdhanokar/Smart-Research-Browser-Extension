<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HindSite</title>

  <style>
    body {
      width: 450px;
      min-height: 300px;
      max-height: 600px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 600px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2d4a6f 50%, #334155 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      color: #f8fafc;
    }

    .header p {
      margin: 5px 0 0 0;
      font-size: 12px;
      color: #cbd5e1;
    }

    .stats {
      background: white;
      padding: 15px 20px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stats-item {
      text-align: center;
    }

    .stats-number {
      font-size: 24px;
      font-weight: bold;
      color: #1e3a5f;
    }

    .stats-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .pages-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .page-item {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .page-item:hover {
      border-color: #1e3a5f;
      box-shadow: 0 2px 8px rgba(30, 58, 95, 0.15);
      transform: translateY(-2px);
    }

    .page-url {
      flex: 1;
      font-size: 13px;
      color: #1e3a5f;
      font-weight: 500;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .icon-btn {
      appearance: none;
      border: none;
      background: transparent;
      padding: 6px;
      border-radius: 8px;
      line-height: 0;
      color: #9ca3af;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .icon-btn:hover {
      background: #f3f4f6;
      color: #6b7280;
    }

    .icon-btn:active {
      background: #e5e7eb;
      color: #4b5563;
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
      display: block;
    }

    .icon-btn.quick-search-btn {
      color: #1e3a5f;
    }

    .icon-btn.quick-search-btn svg {
      width: 24px;
      height: 24px;
    }

    .icon-btn.quick-search-btn:hover {
      color: #2d4a6f;
    }

    .page-preview {
      font-size: 12px;
      color: #666;
      margin-bottom: 8px;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .page-meta {
      display: flex;
      gap: 15px;
      font-size: 11px;
      color: #999;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #f0f0f0;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .empty-state-title {
      font-size: 16px;
      font-weight: 600;
      color: #666;
      margin-bottom: 8px;
    }

    .empty-state-text {
      font-size: 13px;
      line-height: 1.5;
    }

    .actions {
      padding: 15px 20px;
      background: white;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
      flex: 0 0 auto;
    }

    .btn {
      flex: 1;
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .pages-container::-webkit-scrollbar {
      width: 6px;
    }

    .pages-container::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .pages-container::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 3px;
    }

    .pages-container::-webkit-scrollbar-thumb:hover {
      background: #999;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>HindSite</h1>
    <p>Your automatically saved pages</p>
  </div>

  <div class="stats">
    <div class="stats-item">
      <div class="stats-number" id="totalPages">0</div>
      <div class="stats-label">Pages Saved</div>
    </div>
    <div class="stats-item">
      <button class="icon-btn quick-search-btn" id="quickSearchBtn" type="button" title="Quick Tab Search">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M11 4a7 7 0 0 1 5.657 11.314l2.514 2.515a1 1 0 0 1-1.414 1.414l-2.515-2.514A7 7 0 1 1 11 4Zm0 2a5 5 0 1 0 0 10 5 5 0 0 0 0-10Z" stroke="currentColor" stroke-width="1.2" />
        </svg>
      </button>
      <div class="stats-label">Quick Search</div>
    </div>
    <div class="stats-item">
      <div class="stats-number" id="avgTime">0s</div>
      <div class="stats-label">Avg Time</div>
    </div>
  </div>

  <div class="pages-container" id="pagesList">
    <!-- Pages will be inserted here -->
  </div>

  <div class="actions">
    <button class="btn btn-danger" id="clearBtn">Clear All</button>
  </div>

  <script src="index.js"></script>
</body>

</html>
