<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HindSite Quick Search</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a3252 0%, #263e5e 50%, #2c384a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      box-sizing: border-box;
    }

    body.standalone {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-end;
      position: relative;
      padding-bottom: 32px;
    }

    /* Dims the quick-search window chrome when results are shown (focus on cards) */
    .qs-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.58);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.22s ease, visibility 0.22s ease;
      z-index: 0;
    }

    body.qs-has-results .qs-backdrop,
    body.qs-search-loading .qs-backdrop {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .qs-main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
      width: 100%;
      pointer-events: none;
    }

    /* Sit result cards just above the search bar — no huge empty band above */
    body.qs-has-results .qs-main,
    body.qs-search-loading .qs-main {
      justify-content: flex-end;
      padding-bottom: 10px;
    }

    .qs-results {
      display: none;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: clamp(12px, 2vw, 24px);
      width: min(96vw, 1800px);
      height: min(75vh, calc(100vh - 160px));
      min-height: 280px;
      max-height: 75vh;
      padding: 0 clamp(8px, 2vw, 24px);
      box-sizing: border-box;
      pointer-events: auto;
    }

    body.qs-results-visible .qs-results {
      display: flex;
    }

    /* Shrink-wrap row height to thumbnails + footer only */
    body.qs-has-results .qs-results {
      height: auto;
      min-height: 0;
      max-height: none;
      align-items: flex-start;
    }

    body.qs-results-visible:not(.qs-has-results) .qs-results {
      height: auto;
      min-height: 100px;
      max-height: none;
      align-items: center;
    }

    body.qs-search-loading .qs-results {
      min-height: 120px;
      align-items: center;
      justify-content: center;
    }

    .qs-loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 32px 24px;
      width: 100%;
      box-sizing: border-box;
    }

    .qs-loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(148, 163, 184, 0.22);
      border-top-color: #94a3b8;
      border-radius: 50%;
      animation: qs-spin 0.7s linear infinite;
    }

    .qs-loading-label {
      color: #94a3b8;
      font-size: 14px;
      letter-spacing: 0.02em;
    }

    @keyframes qs-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .qs-results .result-card {
      flex: 1 1 0;
      min-width: 0;
      max-width: calc(33.333% - 12px);
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      overflow: hidden;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    .qs-results .result-card:hover {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      transform: translateY(-2px);
    }

    .qs-results .result-thumb {
      flex: 0 0 auto;
      width: 100%;
      line-height: 0;
      background: rgba(0, 0, 0, 0.28);
    }

    .qs-results .result-thumb img {
      width: 100%;
      height: auto;
      display: block;
    }

    .qs-results .result-thumb-empty {
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 12px;
      line-height: normal;
    }

    .qs-results .result-body {
      flex: 0 0 auto;
      padding: 6px 10px 8px;
      overflow: hidden;
    }

    .qs-results .result-head {
      color: #e2e8f0;
      font-weight: 600;
      font-size: 13px;
      line-height: 1.2;
      margin-bottom: 2px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    .qs-results .result-url-preview {
      color: #94a3b8;
      font-size: 11px;
      line-height: 1.3;
      word-break: break-all;
      margin-bottom: 0;
    }

    .quicksearch-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: min(560px, 92vw);
      margin: 0 auto;
      flex-shrink: 0;
      pointer-events: none;
    }

    .quicksearch-wrap .shell {
      pointer-events: auto;
      width: 100%;
    }

    body.standalone .shell {
      position: relative;
      z-index: 2;
    }

    .shell {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(26,50,82,0.96) 0%, rgba(38,62,94,0.94) 50%, rgba(44,56,74,0.92) 100%);
      box-shadow:
        0 20px 48px rgba(26,50,82,0.45),
        0 0 0 1px rgba(148,163,184,0.35);
      border: 1px solid rgba(148,163,184,0.5);
      backdrop-filter: blur(22px);
      display: flex;
      align-items: center;
      gap: 10px;
      color: #e2e8f0;
      opacity: 0;
      transform: translateY(18px) scale(0.985);
      transition: transform 180ms cubic-bezier(.2,.9,.2,1.15), opacity 180ms ease-out;
    }

    .shell.is-open {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .hint {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #94a3b8;
      margin-right: 4px;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    .input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: #f1f5f9;
      font-size: 14px;
      font-weight: 400;
      padding: 3px 0;
      resize: none;
      overflow: hidden;
      min-height: 20px;
      max-height: 120px;
      line-height: 1.35;
    }

    .input::placeholder {
      color: #94a3b8;
    }

    @keyframes hsMicPulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.22);
      }
      70% {
        box-shadow: 0 0 0 10px rgba(255, 255, 255, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
      }
    }

    .mic-btn,
    .send-chip {
      transition: transform 0.18s ease-out;
    }

    .mic-btn:hover,
    .send-chip:hover {
      transform: scale(1.15);
    }

    .mic-btn:active,
    .send-chip:active {
      transform: scale(0.92);
    }

    .send-chip.press {
      transform: scale(0.88);
    }

    .mic-btn {
      flex: 0 0 auto;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.5);
      background: rgba(26,50,82,0.9);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .mic-btn.listening {
      border-color: rgba(255, 255, 255, 0.6);
      animation: hsMicPulse 1.1s ease-in-out infinite;
    }

    .send-chip {
      flex: 0 0 auto;
      font-size: 12px;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(26,50,82,0.9);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }

    .send-chip span {
      transform: translateY(-1px);
      font-size: 14px;
    }

    .hint-kbd {
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-size: 10px;
      color: #94a3b8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

  </style>
</head>
<body>
  <div class="qs-backdrop" id="qsBackdrop" aria-hidden="true"></div>
  <div class="qs-main">
    <div id="resultsContainer" class="qs-results"></div>
  </div>
  <div class="quicksearch-wrap">
  <div class="shell">
    <div class="hint">HindSite quick search</div>
    <textarea
      id="quickSearchInput"
      class="input"
      placeholder="Type to search..."
      autocomplete="off"
      spellcheck="false"
      rows="1"
    ></textarea>
    <button class="mic-btn" id="quickSearchMicBtn" type="button" title="Voice input (Alt+V)">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
        <path d="M12 3a2.5 2.5 0 0 1 2.5 2.5v5A2.5 2.5 0 0 1 12 13a2.5 2.5 0 0 1-2.5-2.5v-5A2.5 2.5 0 0 1 12 3Zm0 14a5 5 0 0 0 5-5 .75.75 0 0 1 1.5 0A6.5 6.5 0 0 1 12.75 18.47V21h-1.5v-2.53A6.5 6.5 0 0 1 5.5 12a.75.75 0 0 1 1.5 0 5 5 0 0 0 5 5Z" fill="currentColor"/>
      </svg>
    </button>
    <div class="send-chip" title="Send" role="button" tabindex="0">
      <span>➤</span>
    </div>
  </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
